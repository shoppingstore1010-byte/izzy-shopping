{% if messages %}
  <div class="mx-auto max-w-7xl px-4 pt-4 sm:px-6 lg:px-8">
    <div class="grid gap-3">
      {% for message in messages %}
        <div class="rounded-2xl border px-4 py-3 text-sm shadow-soft {% if message.tags == 'success' %}border-emerald-200 bg-emerald-50 text-emerald-800{% elif message.tags == 'error' %}border-rose-200 bg-rose-50 text-rose-800{% elif message.tags == 'warning' %}border-amber-200 bg-amber-50 text-amber-800{% else %}border-slate-200 bg-slate-50 text-slate-700{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  </div>
{% endif %}
