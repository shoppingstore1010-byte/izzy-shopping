{% extends 'base.html' %}

{% block title %}Page Not Found - {{ site_settings.site_name }}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100">
    <div class="text-center">
        <h1 class="text-9xl font-bold text-accent mb-4">404</h1>
        <h2 class="text-3xl font-bold text-gray-900 mb-4">Page Not Found</h2>
        <p class="text-gray-600 mb-8">The page you're looking for doesn't exist.</p>
        <a href="{% url 'home' %}" class="inline-block bg-primary text-white px-8 py-4 rounded-lg font-semibold hover:bg-secondary transition-colors">
            Go Home
        </a>
    </div>
</div>
{% endblock %}
