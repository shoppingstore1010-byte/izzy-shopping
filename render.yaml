services:
  - type: web
    name: izzy-shopping
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: izzy-shopping.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://izzy-shopping.onrender.com
      - key: PYTHON_VERSION
        value: 3.12.4
