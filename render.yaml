services:
  - type: web
    name: izzy-signature
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn izzy_signature.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: izzy-signature-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: izzy_signature.settings
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FACEBOOK_PIXEL_ID
        sync: false
      - key: FACEBOOK_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false
      - key: WHATSAPP_ADMIN_PHONE
        sync: false
      - key: ALLOWED_HOSTS
        value: izzy-signature.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://izzy-signature.onrender.com
      - key: SITE_NAME
        value: Izzy Signature
    healthCheckPath: /

databases:
  - name: izzy-signature-db
    databaseName: izzy_signature
    user: izzy_user
