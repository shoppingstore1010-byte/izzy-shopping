version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: izzy_signature
      POSTGRES_USER: izzy_user
      POSTGRES_PASSWORD: izzy_password
    ports:
      - "5432:5432"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://izzy_user:izzy_password@db:5432/izzy_signature
      SECRET_KEY: django-insecure-dev-key-change-in-production
      DJANGO_SETTINGS_MODULE: izzy_signature.settings

volumes:
  postgres_data:
